<script>
// ==============================================
// FIXED & CLEAN SCRIPT

let markets = [];
let currentMarket = null;
let tradeSide = 'long';
let leverage = 20;
let isConnected = false;
let publicKey = null;
let provider = null;
let theme = 'dark';
let priceHistory = [];
let activePredictions = [];

// Live Prices
async function fetchLivePrices() {
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,dogecoin&vs_currencies=usd&include_24hr_change=true');
    const data = await res.json();

    markets = [
      {sym:'BTC', name:'Bitcoin', price: data.bitcoin?.usd || 105000, chg: parseFloat((data.bitcoin?.usd_24h_change || 0).toFixed(2)), vol:'$42B', type:'PERP'},
      {sym:'ETH', name:'Ethereum', price: data.ethereum?.usd || 3800, chg: parseFloat((data.ethereum?.usd_24h_change || 0).toFixed(2)), vol:'$21B', type:'PERP'},
      {sym:'SOL', name:'Solana', price: data.solana?.usd || 178, chg: parseFloat((data.solana?.usd_24h_change || 0).toFixed(2)), vol:'$4.8B', type:'PERP'},
      {sym:'BNB', name:'BNB', price: data.binancecoin?.usd || 610, chg: parseFloat((data.binancecoin?.usd_24h_change || 0).toFixed(2)), vol:'$1.9B', type:'PERP'},
      {sym:'DOGE', name:'Dogecoin', price: data.dogecoin?.usd || 0.38, chg: parseFloat((data.dogecoin?.usd_24h_change || 0).toFixed(2)), vol:'$1.2B', type:'PERP'},
    ];
    if (!currentMarket) currentMarket = markets[0];
    renderMarketList();
    updateTickerBar();
    renderOrderBook();
    initChart();
    populatePredAssetSelect();
  } catch(e) {
    console.error("Price fetch failed", e);
  }
}

// Real Wallet Connection
const MAINNET_RPC = "https://api.mainnet-beta.solana.com";

async function connectWallet(name) {
  let wallet = null;
  if (name === "Phantom" && window.solana?.isPhantom) wallet = window.solana;
  else if (name === "Backpack" && window.backpack) wallet = window.backpack;
  else if (name === "Solflare" && window.solflare) wallet = window.solflare;
  else {
    alert("Please install Phantom or Backpack wallet.");
    return;
  }

  try {
    const resp = await wallet.connect();
    publicKey = resp.publicKey;
    isConnected = true;

    const connection = new solanaWeb3.Connection(MAINNET_RPC);
    const balance = await connection.getBalance(publicKey);
    const solFormatted = (balance / 1_000_000_000).toFixed(4);

    closeModal('walletModal');
    showNotif('✅', 'Wallet Connected', `${name} • ${publicKey.toString().slice(0,4)}...${publicKey.toString().slice(-4)}`);

    document.querySelector('.topbar-btn.primary-btn').innerHTML = `🟢 ${name} • ${solFormatted} SOL`;
    const notice = document.querySelector('.connect-notice');
    if (notice) notice.style.display = 'none';
    const balanceEl = document.querySelector('.balance-val');
    if (balanceEl) balanceEl.textContent = `${solFormatted} SOL`;
  } catch (err) {
    console.error(err);
    showNotif('❌', 'Connection Failed', 'Please approve in your wallet');
  }
}

function placeOrder() {
  if (!isConnected) {
    openWallet();
    return;
  }
  showNotif('🚀', 'Order Ready', `Preparing ${tradeSide.toUpperCase()} ${currentMarket.sym} ${leverage}×`);
}

// === YOUR ORIGINAL FUNCTIONS (kept intact) ===
function init() {
  fetchLivePrices();
  setInterval(fetchLivePrices, 30000);
  // Call your original init functions
  renderMarketList();
  renderOrderBook();
  renderTickerList();
  initChart();
}

function openWallet() { document.getElementById('walletModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showNotif(icon, title, sub) {
  document.getElementById('notifIcon').textContent = icon;
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifSub').innerHTML = sub;
  const n = document.getElementById('notification');
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 5000);
}

// Add your other original functions here (toggleTheme, renderMarketList, drawChart, setSide, etc.)

window.onload = init;
</script>
