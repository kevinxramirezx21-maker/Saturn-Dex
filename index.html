<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn DEX — Perpetual Futures & Prediction Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a1f;
            --accent-primary: #8b3dff;
            --accent-glow: rgba(139, 61, 255, 0.5);
            --text-primary: #f0f0ff;
            --text-secondary: #c0b0ff;
            --green: #00e676;
            --red: #ff3d71;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a1f;
            color: var(--text-primary);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Keep your previous Saturn background styles here (space-bg, stars, saturn, rings, moons) */
        /* Paste the full background CSS from the realistic Saturn version if you want */

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 4.8rem;
            background: linear-gradient(90deg, #e0bbff, #a855f7, #8b3dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .trade-panel {
            background: rgba(20, 20, 40, 0.85);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(139, 61, 255, 0.3);
            margin-top: 30px;
            width: 420px;
        }

        .leverage-slider {
            width: 100%;
            margin: 15px 0;
        }

        .btn {
            background: linear-gradient(135deg, #8b3dff, #6c2bd9);
            color: white;
            border: none;
            padding: 16px 32px;
            margin: 8px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(139,61,255,0.5);
        }

        .btn.short { background: linear-gradient(135deg, #ff3d71, #cc2255); }

        #status {
            margin-top: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            min-height: 70px;
        }

        .tp-sl {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        input {
            background: #1a1a32;
            border: 1px solid #4a4a6a;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Your Saturn background goes here (keep the previous version's .space-bg, .stars, .saturn-container etc.) -->

    <div class="content">
        <h1>Saturn DEX</h1>
        <p>Perpetual Futures on Drift • Powered by Solana</p>

        <div class="trade-panel">
            <button class="btn" onclick="connectWallet()" style="width:100%; margin-bottom:15px;">🔌 Connect Wallet</button>

            <div style="margin:15px 0;">
                <label>Leverage: <span id="levValue">20</span>x</label>
                <input type="range" id="leverageSlider" class="leverage-slider" min="1" max="300" value="20" oninput="updateLeverage(this.value)">
            </div>

            <div class="tp-sl">
                <div style="flex:1;">
                    <label>Take Profit</label>
                    <input type="number" id="tpInput" placeholder="e.g. 105000" value="">
                </div>
                <div style="flex:1;">
                    <label>Stop Loss</label>
                    <input type="number" id="slInput" placeholder="e.g. 98000" value="">
                </div>
            </div>

            <div style="margin-top:20px;">
                <button class="btn" onclick="placeDriftOrder('long')" style="width:48%;">📈 LONG SOL-PERP</button>
                <button class="btn short" onclick="placeDriftOrder('short')" style="width:48%;">📉 SHORT SOL-PERP</button>
            </div>
        </div>

        <div id="status"></div>
    </div>

    <script>
        let walletProvider = null;
        let publicKey = null;
        let isConnected = false;
        let currentLeverage = 20;

        function updateLeverage(val) {
            currentLeverage = parseInt(val);
            document.getElementById('levValue').textContent = currentLeverage;
        }

        async function connectWallet() {
            const status = document.getElementById('status');
            if (window.solana?.isPhantom) walletProvider = window.solana;
            else if (window.backpack) walletProvider = window.backpack;
            else {
                status.innerHTML = '❌ Please install Phantom or Backpack wallet';
                return;
            }

            try {
                const resp = await walletProvider.connect();
                publicKey = resp.publicKey;
                isConnected = true;
                status.innerHTML = `✅ Wallet connected: ${publicKey.toString().slice(0,6)}...${publicKey.toString().slice(-4)}`;
                status.style.color = '#00e676';
            } catch (e) {
                status.innerHTML = '❌ Connection failed';
                status.style.color = '#ff3d71';
            }
        }

        async function placeDriftOrder(direction) {
            const status = document.getElementById('status');
            if (!isConnected) {
                status.innerHTML = 'Please connect wallet first';
                status.style.color = '#ff3d71';
                return;
            }

            const tp = document.getElementById('tpInput').value || '—';
            const sl = document.getElementById('slInput').value || '—';

            status.innerHTML = `🔄 Sending ${direction.toUpperCase()} SOL-PERP @ ${currentLeverage}x<br>TP: ${tp} | SL: ${sl}`;
            status.style.color = '#ffd700';

            // Simulate real order flow (we'll make this fully on-chain in the next step)
            setTimeout(() => {
                status.innerHTML = `✅ ${direction.toUpperCase()} order signed and sent to Drift!<br>Leverage: ${currentLeverage}x | TP: ${tp} | SL: ${sl}<br>Transaction submitted on Solana.`;
                status.style.color = '#00e676';
            }, 1200);
        }

        window.onload = () => {
            console.log("Saturn DEX with leverage slider & TP/SL loaded 🪐");
        };
    </script>
</body>
</html>
