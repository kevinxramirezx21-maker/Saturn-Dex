<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn DEX — Perpetual Futures & Prediction Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        /* Your beautiful Saturn background from before */
        :root {
            --bg-primary: #0a0a1f;
            --accent-primary: #8b3dff;
            --accent-glow: rgba(139, 61, 255, 0.5);
            --text-primary: #f0f0ff;
            --text-secondary: #c0b0ff;
            --green: #00e676;
            --red: #ff3d71;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-primary);
            background: #0a0a1f;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        .space-bg, .stars, .saturn-container, .saturn, .rings, .moon { /* Keep your previous Saturn styles here */ }
        /* (Paste the full background CSS from the last version I gave you — the realistic Saturn with stars and moons) */

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        h1 { font-family: 'Orbitron', monospace; font-size: 5rem; font-weight: 900; background: linear-gradient(90deg, #e0bbff, #a855f7, #8b3dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 50px rgba(139, 61, 255, 0.7); }

        .btn {
            background: linear-gradient(135deg, #8b3dff, #6c2bd9);
            color: white;
            border: none;
            padding: 18px 40px;
            margin: 15px;
            border-radius: 14px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 35px rgba(139, 61, 255, 0.6);
        }

        .btn:hover { transform: translateY(-6px); box-shadow: 0 0 60px rgba(139, 61, 255, 0.9); }

        #status { margin-top: 40px; font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; min-height: 60px; }
    </style>
</head>
<body>

    <!-- Your Saturn background (space-bg, stars, saturn-container, etc.) — keep it from the previous version -->

    <div class="content">
        <h1>Saturn DEX</h1>
        <p>Perpetual Futures & Prediction Markets on Solana</p>

        <div>
            <button class="btn" onclick="connectWallet()">🔌 Connect Wallet</button>
            <button class="btn" onclick="placeLongOrder()">📈 LONG SOL-PERP</button>
            <button class="btn" onclick="placeShortOrder()" style="background: linear-gradient(135deg, #ff3d71, #cc2255);">📉 SHORT SOL-PERP</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        let isConnected = false;
        let publicKey = null;
        let walletProvider = null;

        async function connectWallet() {
            const status = document.getElementById('status');
            if (window.solana && window.solana.isPhantom) walletProvider = window.solana;
            else if (window.backpack) walletProvider = window.backpack;
            else {
                status.innerHTML = '❌ Please install Phantom or Backpack';
                return;
            }

            try {
                const resp = await walletProvider.connect();
                publicKey = resp.publicKey;
                isConnected = true;
                status.innerHTML = `✅ Connected: ${publicKey.toString().slice(0,6)}...${publicKey.toString().slice(-4)}<br>Ready for Drift trading`;
                status.style.color = '#00e676';
            } catch (err) {
                status.innerHTML = '❌ Connection failed';
                status.style.color = '#ff3d71';
            }
        }

        // Simple Drift demo order (real transaction signing coming next)
        async function placeDriftOrder(direction) {
            const status = document.getElementById('status');
            if (!isConnected) {
                status.innerHTML = 'Please connect wallet first';
                status.style.color = '#ff3d71';
                return;
            }

            status.innerHTML = `🚀 Preparing ${direction.toUpperCase()} SOL-PERP on Drift...<br>Opening Phantom for signature...`;
            status.style.color = '#ffd700';

            // For now we show the flow — next step makes it a real signed transaction
            setTimeout(() => {
                status.innerHTML = `✅ ${direction.toUpperCase()} order signed and sent to Drift!<br>(Real on-chain tx in next update)`;
                status.style.color = '#00e676';
            }, 1500);
        }

        function placeLongOrder() { placeDriftOrder('long'); }
        function placeShortOrder() { placeDriftOrder('short'); }

        window.onload = () => {
            console.log("%cSaturn DEX with Drift ready 🪐", "color:#a855f7; font-size:16px");
        };
    </script>
</body>
</html>
