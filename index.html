<script>
// FIXED SCRIPT - All original functions + wallet + live prices

let markets = [];
let currentMarket = null;

let leverage = 20;
let isConnected = false;
let publicKey = null;
let provider = null;
let theme = 'dark';
let priceHistory = [];

// Live Prices
async function fetchLivePrices() {
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,dogecoin&vs_currencies=usd&include_24hr_change=true');
    const data = await res.json();

    markets = [
      {sym:'BTC', name:'Bitcoin', price: data.bitcoin?.usd || 105234.50, chg: parseFloat((data.bitcoin?.usd_24h_change || 2.34).toFixed(2)), vol:'$4.2B', type:'PERP'},
      {sym:'ETH', name:'Ethereum', price: data.ethereum?.usd || 3842.20, chg: parseFloat((data.ethereum?.usd_24h_change || 1.87).toFixed(2)), vol:'$2.1B', type:'PERP'},
      {sym:'SOL', name:'Solana', price: data.solana?.usd || 178.40, chg: parseFloat((data.solana?.usd_24h_change || -0.92).toFixed(2)), vol:'$890M', type:'PERP'},
      {sym:'BNB', name:'BNB', price: data.binancecoin?.usd || 612.80, chg: parseFloat((data.binancecoin?.usd_24h_change || 3.21).toFixed(2)), vol:'$540M', type:'PERP'},
      {sym:'DOGE', name:'Dogecoin', price: data.dogecoin?.usd || 0.3812, chg: parseFloat((data.dogecoin?.usd_24h_change || 5.44).toFixed(2)), vol:'$320M', type:'PERP'},
    ];
    if (!currentMarket) currentMarket = markets[0];
    renderMarketList();
    updateTickerBar();
    renderOrderBook();
    initChart();
  } catch(e) {
    console.error("Price fetch failed", e);
  }
}

// Real Wallet Connection
const MAINNET_RPC = "https://api.mainnet-beta.solana.com";

async function connectWallet(name) {
  let wallet = null;
  if (name === "Phantom" && window.solana?.isPhantom) wallet = window.solana;
  else if (name === "Backpack" && window.backpack) wallet = window.backpack;
  else if (name === "Solflare" && window.solflare) wallet = window.solflare;
  else {
    alert("Please install Phantom or Backpack wallet.");
    return;
  }

  try {
    const resp = await wallet.connect();
    publicKey = resp.publicKey;
    isConnected = true;

    const connection = new solanaWeb3.Connection(MAINNET_RPC);
    const solBalance = await connection.getBalance(publicKey);
    const solFormatted = (solBalance / 1_000_000_000).toFixed(4);

    closeModal('walletModal');
    showNotif('✅', 'Wallet Connected', `${name} • ${publicKey.toString().slice(0,4)}...${publicKey.toString().slice(-4)}`);

    document.querySelector('.topbar-btn.primary-btn').innerHTML = `🟢 ${name} • ${solFormatted} SOL`;
    document.querySelector('.connect-notice').style.display = 'none';
    document.querySelector('.balance-val').textContent = `${solFormatted} SOL`;
  } catch (err) {
    console.error(err);
    showNotif('❌', 'Connection Failed', 'Please approve in your wallet');
  }
}

function placeOrder() {
  if (!isConnected) {
    openWallet();
    return;
  }
  showNotif('🚀', 'Order Ready', `Preparing ${tradeSide.toUpperCase()} ${currentMarket.sym} ${leverage}×`);
}
