<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saturn DEX — The Next-Gen Perp DEX</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<style>
/* (Your entire original <style> block goes here unchanged — I kept it identical for consistency) */
:root { /* ... all your CSS variables ... */ }
/* ... rest of your full CSS ... (to save space here, assume it's the same as you provided) */
</style>
</head>
<body>

<!-- Your entire HTML structure (landing + app) remains the same, with these additions: -->

<!-- In the bottom-tabs, replace the existing ones with this updated version -->
<div class="bottom-tabs">
  <div class="bottom-tab active" onclick="switchBottomTab(0)">Positions</div>
  <div class="bottom-tab" onclick="switchBottomTab(1)">Open Orders</div>
  <div class="bottom-tab" onclick="switchBottomTab(2)">Predictions</div>
  <div class="bottom-tab" onclick="switchBottomTab(3)">History</div>
</div>

<!-- Bottom content area — we'll control visibility with JS -->
<div class="bottom-content" id="bottomContent">
  <!-- Positions table (your original) -->
  <!-- ... your original positions table ... -->

  <!-- Predictions section (new) -->
  <div id="predictionsTab" style="display:none; padding:16px;">
    <h3 style="margin-bottom:16px; font-family:'Orbitron',monospace;">Prediction Markets</h3>
    <p style="color:var(--text-secondary); font-size:13px; margin-bottom:20px;">Bet on top crypto prices in 5/15/30 min intervals. Wrong bets send lost amount to EVM treasury.</p>

    <!-- Bet form -->
    <div style="background:var(--bg-panel); padding:16px; border-radius:12px; border:1px solid var(--border-color); margin-bottom:24px;">
      <div class="form-row" style="margin-bottom:12px;">
        <select id="predAsset" class="order-type-select" style="flex:1;">
          <!-- populated by JS -->
        </select>
        <select id="predInterval" class="order-type-select" style="flex:1;">
          <option value="5">5 minutes</option>
          <option value="15">15 minutes</option>
          <option value="30" selected>30 minutes</option>
        </select>
      </div>

      <div class="form-row">
        <button onclick="setPredDirection('above')" id="aboveBtn" class="ls-tab long" style="flex:1; margin-right:6px;">ABOVE</button>
        <button onclick="setPredDirection('below')" id="belowBtn" class="ls-tab short" style="flex:1;">BELOW</button>
      </div>

      <div class="input-group" style="margin-top:12px;">
        <label>Strike Price (auto near current)</label>
        <input type="number" id="predStrike" readonly style="background:var(--bg-input);"/>
        <div class="input-suffix">USDT</div>
      </div>

      <div class="input-group">
        <label>Bet Amount</label>
        <input type="number" id="predAmount" value="10" placeholder="Bet size"/>
        <div class="input-suffix">USDT</div>
      </div>

      <button onclick="placePrediction()" class="btn-trade long" style="margin-top:12px; width:100%;">PLACE PREDICTION BET</button>
    </div>

    <!-- Active Predictions -->
    <h4 style="margin:20px 0 12px; color:var(--text-accent);">Active Predictions</h4>
    <div id="activePreds" style="display:flex; flex-direction:column; gap:12px;">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- Rest of your modals and notification stay the same -->

<script>
// Your original variables + new ones
let markets = []; // will be populated live
let currentMarket = null;
let tradeSide = 'long';
let leverage = 20;
let isConnected = false;
let theme = 'dark';
let priceHistory = [];
let activePredictions = [];

// Live price fetching
async function fetchLivePrices() {
  try {
    const symbols = ['bitcoin','ethereum','solana','binancecoin','dogecoin'];
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${symbols.join(',')}&vs_currencies=usd&include_24hr_change=true`);
    const data = await res.json();

    markets = [
      {sym:'BTC', name:'Bitcoin', price:data.bitcoin.usd, chg:parseFloat(data.bitcoin.usd_24h_change?.toFixed(2)||0), vol:'$42B', type:'PERP'},
      {sym:'ETH', name:'Ethereum', price:data.ethereum.usd, chg:parseFloat(data.ethereum.usd_24h_change?.toFixed(2)||0), vol:'$21B', type:'PERP'},
      {sym:'SOL', name:'Solana', price:data.solana.usd, chg:parseFloat(data.solana.usd_24h_change?.toFixed(2)||0), vol:'$4.8B', type:'PERP'},
      {sym:'BNB', name:'BNB', price:data.binancecoin.usd, chg:parseFloat(data.binancecoin.usd_24h_change?.toFixed(2)||0), vol:'$1.9B', type:'PERP'},
      {sym:'DOGE', name:'Dogecoin', price:data.dogecoin.usd, chg:parseFloat(data.dogecoin.usd_24h_change?.toFixed(2)||0), vol:'$1.2B', type:'PERP'},
    ];

    if (!currentMarket) currentMarket = markets[0];
    renderMarketList();
    updateTickerBar();
    renderOrderBook();
    initChart();
    populatePredAssetSelect();
  } catch(e) {
    console.error("Price fetch failed, using fallback", e);
    // fallback static if needed
  }
}

// Populate prediction asset dropdown
function populatePredAssetSelect() {
  const sel = document.getElementById('predAsset');
  sel.innerHTML = markets.map(m => `<option value="${m.sym}">${m.sym}/USDT</option>`).join('');
  sel.onchange = updatePredStrike;
}

// Update strike price when asset or interval changes
function updatePredStrike() {
  const sym = document.getElementById('predAsset').value;
  const m = markets.find(x => x.sym === sym);
  if (m) {
    const strike = (m.price * (Math.random()*0.004 + 0.998)).toFixed(m.price > 100 ? 2 : 6); // slight offset
    document.getElementById('predStrike').value = strike;
  }
}

let predDirection = 'above';
function setPredDirection(dir) {
  predDirection = dir;
  document.getElementById('aboveBtn').classList.toggle('active', dir==='above');
  document.getElementById('belowBtn').classList.toggle('active', dir==='below');
}

// Place a prediction bet (demo)
function placePrediction() {
  if (!isConnected) { openWallet(); return; }

  const asset = document.getElementById('predAsset').value;
  const interval = parseInt(document.getElementById('predInterval').value);
  const strike = parseFloat(document.getElementById('predStrike').value);
  const amount = parseFloat(document.getElementById('predAmount').value) || 10;

  const endTime = Date.now() + interval * 60 * 1000;

  const bet = {
    id: Date.now(),
    asset,
    direction: predDirection,
    strike,
    amount,
    interval,
    endTime,
    status: 'active'
  };

  activePredictions.push(bet);
  renderActivePreds();

  showNotif('🎲', 'Prediction Placed', `${predDirection.toUpperCase()} ${asset} after ${interval}min @ $${strike}`);

  // Simulate resolution after time
  setTimeout(() => resolvePrediction(bet.id), interval * 60 * 1000 + 5000);
}

function renderActivePreds() {
  const container = document.getElementById('activePreds');
  container.innerHTML = activePredictions.map(bet => {
    const remaining = Math.max(0, Math.floor((bet.endTime - Date.now())/1000));
    const minLeft = Math.floor(remaining/60);
    const secLeft = remaining % 60;
    return `
      <div style="background:var(--bg-card); padding:14px; border-radius:10px; border:1px solid var(--border-color);">
        <div style="display:flex;justify-content:space-between;">
          <strong>${bet.asset} — ${bet.direction.toUpperCase()} $${bet.strike}</strong>
          <span style="color:var(--text-muted); font-size:12px;">${bet.interval}min</span>
        </div>
        <div style="margin-top:8px; font-size:13px;">
          Bet: <span style="font-family:'JetBrains Mono'">$${bet.amount}</span> 
          <span style="color:var(--text-muted)">• Remaining: ${minLeft}m ${secLeft}s</span>
        </div>
      </div>
    `;
  }).join('') || '<p style="color:var(--text-muted); text-align:center; padding:20px;">No active predictions yet</p>';
}

function resolvePrediction(id) {
  const bet = activePredictions.find(b => b.id === id);
  if (!bet) return;

  // Simulate win/lose (60% win chance for demo)
  const won = Math.random() > 0.4;
  const currentPrice = markets.find(m => m.sym === bet.asset).price;

  if (won) {
    showNotif('🏆', 'Prediction Won!', `You won $${(bet.amount * 1.85).toFixed(2)}`);
  } else {
    const evmAddr = "0x742d35Cc6634C0532925a3b8D4a8C8e3bF4f8f8f"; // sample EVM treasury
    showNotif('💸', 'Prediction Lost', `$${bet.amount} sent to EVM address<br><small>${evmAddr}</small>`);
  }

  bet.status = won ? 'won' : 'lost';
  // remove after resolution
  setTimeout(() => {
    activePredictions = activePredictions.filter(b => b.id !== id);
    renderActivePreds();
  }, 8000);
}

// Bottom tab switching
function switchBottomTab(tabIndex) {
  document.querySelectorAll('.bottom-tab').forEach((t,i) => t.classList.toggle('active', i===tabIndex));
  document.getElementById('predictionsTab').style.display = (tabIndex === 2) ? 'block' : 'none';
  // hide original positions for demo — you can expand this
}

// Your original functions (init, renderMarketList, etc.) stay mostly the same, but call fetchLivePrices() instead of static data

function init() {
  fetchLivePrices();
  setInterval(fetchLivePrices, 30000); // refresh every 30s

  renderMarketList();
  renderOrderBook();
  renderTickerList();
  initChart();
  populatePredAssetSelect();
  updatePredStrike();

  // order type listener etc. (your original)
  document.getElementById('orderType').addEventListener('change', ...);
}

// Rest of your original script (openApp, toggleTheme, connectWallet, placeOrder, chart drawing, etc.) remains unchanged

// Call init at the end
window.onload = init;
</script>
</body>
</html>
